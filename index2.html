<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palace Csocso Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link

      rel="stylesheet"
    />

    <!-- <script src="https://unpkg.com/vue@next"></script> -->
    <style>
      .beNoWrap {
        flex-flow: row;
        background-color: mintcream;
        min-height: 14em;
      }
      .red {
        margin-right: 1em !important;
      }
    </style>
  </head>

  <body>
    <div id="app" class="container text-center user-select-none">
      <div class="card row mt-3 align-items-center beNoWrap">
        <player-card
          v-for="key in defaultPostions"
          :key="key"
          v-model:player="game[_.head(_.split(key, '-'))][_.last(_.split(key, '-'))]"
          :color="_.head(_.split(key, '-'))"
          :position="_.last(_.split(key, '-'))"
          :app="app"
          :settings="settings"
          :configurations="configurations"
          :game="game"
          :nicknames="nicknames"
        />
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/8.1.0/mdb.umd.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/relativeTime.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs/plugin/duration.js"></script>

    <script type="module">
      import { UUID } from "https://unpkg.com/uuidjs@^5";
      const IconSelector = Vue.component("icon-selector", {
        props: ["selector", "size", "color"],
        methods: {
          getIcon(selector, size = 20, color = "currentColor") {
            switch (selector) {
              case "position": {
                return `
                  <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" fill="${color}" class="bi bi-arrow-down-up" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M11.5 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L11 2.707V14.5a.5.5 0 0 0 .5.5m-7-14a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 .708-.708L4 13.293V1.5a.5.5 0 0 1 .5-.5" />
                  </svg>
                `;
              }
              case "play": {
                return `
                  <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" fill="${color}" class="bi bi-play-fill" viewBox="0 0 16 16">
                    <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393"/>
                  </svg>
                `;
              }
              case "pause": {
                return `
                  <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" fill="${color}" class="bi bi-pause-fill" viewBox="0 0 16 16">
                    <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5m5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5"/>
                  </svg>
                `;
              }
              case "back": {
                return `
                  <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" fill="${color}" class="bi bi-arrow-down" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 1a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 .708-.708L7.5 13.293V1.5A.5.5 0 0 1 8 1"/>
                  </svg>
                `;
              }
              case "front": {
                return `
                  <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" fill="${color}" class="bi bi-arrow-up" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L7.5 2.707V14.5a.5.5 0 0 0 .5.5"/>
                  </svg>
                `;
              }

              case "new-game": {
                return `
      		        <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" fill="${color}" class="bi bi-node-plus" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M11 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8M6.025 7.5a5 5 0 1 1 0 1H4A1.5 1.5 0 0 1 2.5 10h-1A1.5 1.5 0 0 1 0 8.5v-1A1.5 1.5 0 0 1 1.5 6h1A1.5 1.5 0 0 1 4 7.5zM11 5a.5.5 0 0 1 .5.5v2h2a.5.5 0 0 1 0 1h-2v2a.5.5 0 0 1-1 0v-2h-2a.5.5 0 0 1 0-1h2v-2A.5.5 0 0 1 11 5M1.5 7a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5z"/>
                  </svg>
      	        `;
              }

              default:
              case "side": {
                return `
                  <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" fill="${color}" class="bi bi-arrow-left-right" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M1 11.5a.5.5 0 0 0 .5.5h11.793l-3.147 3.146a.5.5 0 0 0 .708.708l4-4a.5.5 0 0 0 0-.708l-4-4a.5.5 0 0 0-.708.708L13.293 11H1.5a.5.5 0 0 0-.5.5m14-7a.5.5 0 0 1-.5.5H2.707l3.147 3.146a.5.5 0 1 1-.708.708l-4-4a.5.5 0 0 1 0-.708l4-4a.5.5 0 1 1 .708.708L2.707 4H14.5a.5.5 0 0 1 .5.5" />
                  </svg>
                `;
              }
            }
          },
        },
        template: `<div v-html="getIcon(selector, size, color)"></div>`,
      });
      const PlayerCard = Vue.component("player-card", {
        props: {
          game: Object,
          color: String, // "red" or "blue"
          position: String, // "front" or "back"
          app: Object,
          settings: Object,
          configurations: Object,
          nicknames: Array,
          player: String,
        },
        emits: ["update:player"],
        methods: {
          playerById(uid) {
            return _.find(this.nicknames, { uid })?.name;
          },
          selectPlayer(value) {
            // $emit("update:game", {
            //   ...game,
            //   [side]: {
            //     ...game[side],
            //     [position]: value,
            //   },
            // });
          },
          incrementScore(position, side) {
            // const game = this.game;
            // game[side].score++;
            // game.meta.push({
            //   position,
            //   side,
            //   timestamp: Date.now(),
            //   player: this.game[side][position],
            //   isOwn: false,
            //   ball: this.game.ball,
            // });
            // game.ball = this.changeSide(side);
            // $emit("update:game", game);
            // if (_.isEqual(game[side].score, Number(this.settings.maxScore))) {
            //   // this.resetGame();
            //   console.log("hallo");
            // }
          },
        },
        computed: {
          playersCount() {
            return _.uniq(
              _.filter([
                this.game.red.front,
                this.game.red.back,
                this.game.blue.front,
                this.game.blue.back,
              ])
            );
          },
          suitablePlayers() {
            return _.map(
              _.filter(
                this.nicknames,
                ({ uid }) => !_.includes(this.playersCount, uid)
              ),
              "uid"
            );
          },
          isE() {
            console.log(this.player, this);
            return "SSSS";
          },
        },
        template: `
          <div class="card" :class="\`text-\${color}\`">
            {{ isE }}
            {{ player }}
            {{ game }}
            {{ color }}
            {{ position }}
          </div>
        `,
      });
      new Vue({
        el: "#app",
        components: {
          IconSelector,
          PlayerCard,
        },
        data() {
          return {
            defaultPostions: [
              "red-front",
              "red-back",
              "blue-front",
              "blue-back",
            ],
            app: {
              isRunning: false,
              isPlaying: false,
              timer: undefined,
            },
            configurations: {
              clearPlayers: true,
              displayGoals: false,
              displayTotalMatchesPlayed: false,
              displayDate: false,
              displayGamesUtils: false,
              displayMetaData: false,
              displayTotalGG: false,
              toggleDisplayWinrate: false,
            },
            settings: {
              timeElapsed: 0,
              pauseDuration: 0,
              maxScore: 5,
            },
            game: {
              red: {
                score: 0,
                front: "407f608b-e91d-4405-9270-552277d8be20",
                back: "",
              },
              blue: {
                score: 0,
                front: "",
                back: "",
              },
              meta: [],
              ball: "red",
            },
            nicknames: [
              { name: "Palotas", uid: "407f608b-e91d-4405-9270-552277d8be20" },
              { name: "Kvr", uid: "eb8adfbd-7440-4edb-b279-c6458795635e" },
              { name: "N5", uid: "e9518215-9b23-41d1-b44c-9539e6c36581" },
              { name: "TomCsi", uid: "784f42fa-faf7-4050-b90d-11964e8d4633" },
              { name: "Cartman", uid: "0d9c0072-45f4-48b1-a38e-94b25279a2bc" },
              { name: "Szempy", uid: "07c20f1c-aadb-4edf-aee0-4432b4e0ba51" },
            ],
          };
        },
        methods: {
          playerById(uid) {
            return _.find(this.nicknames, { uid })?.name;
          },
          startGame() {
            this.app.isPlaying = false;
            this.app.isRunning = false;
            this.settings.timeElapsed = 0;
            this.settings.pauseDuration = 0;
            this.game.meta.push(
              _.reduce(
                _.map(this.defaultPostions, (key) => ({
                  [key]: _.get(this.game, _.join(_.split(key, "-"), ".")),
                })),
                (t, n) => _.assignIn(t, n),
                {
                  timestamp: Date.now(),
                  uid: UUID.generate(),
                  startBall: this.game.ball,
                }
              )
            );
            this.startTimer();
          },
          startTimer() {
            if (this.app.isRunning && this.game.meta.length) {
              const startTime = dayjs(_.head(this.game.meta).timestamp);
              this.app.timer = setInterval(() => {
                // console.log(_.filter(this.game.meta, { changed: "pause" }));
                if (this.app.isPlaying) {
                  this.settings.timeElapsed =
                    dayjs().diff(startTime, "seconds") -
                    this.settings.pauseDuration;
                } else {
                  this.settings.pauseDuration++;
                }
              }, 1000);
            }
          },
          toggleStatus(changed) {
            this.app.isPlaying = _.isEqual(changed, "play");
            this.game.meta.push({
              changed,
              timestamp: Date.now(),
            });
          },
        },
        computed: {
          playersCount() {
            return _.uniq(
              _.filter([
                this.game.red.front,
                this.game.red.back,
                this.game.blue.front,
                this.game.blue.back,
              ])
            );
          },
        },
        mounted() {
          this.startTimer();
          if (!this.app.isPlaying && this.app.isRunning) {
            const offcanvasElement = new bootstrap.Offcanvas("#pauseBackdrop");
            offcanvasElement?.show();
          }
        },
        watch: {
          game: {
            handler(value) {
              console.log("got game", value, this.$data.settings.is1v1);
            },
            deep: true,
          },
        },
      });
    </script>
  </body>
</html>
